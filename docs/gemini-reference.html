<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siete 28 - Detalles que Conectan</title>
    <style>
      :root {
        --bg-header: #ffffff;
        --bg-banner: #d9eba1;
        --text-banner: #0d5c46;
        --bg-main: #e48b7d;
        --bg-cream: #f4f2e6;
        --green-dark: #0d5c46;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        font-family:
          'Poppins' 'Montserrat',
          'Segoe UI',
          sans-serif;
        background-color: var(--bg-cream);
        overflow-x: hidden;
      }

      /* HEADER: Logo centrado */
      header {
        background-color: var(--bg-header);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 5%;
        width: 100%;
        box-sizing: border-box;
        position: relative;
        height: 150px;
      }

      .logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }
      .logo img {
        height: 130px;
      }

      .spacer {
        flex: 1;
      } /* Espaciador para equilibrar */
      .user-icons {
        display: flex;
        gap: 15px;
        align-items: center;
      }
      .user-icons img {
        width: 62px;
        height: 62px;
        cursor: pointer;
        transition: transform 0.2s ease;
      }
      .user-icons img:hover {
        transform: scale(1.1);
      }

      /* BANNER */
      .banner {
        background-color: var(--bg-banner);
        color: var(--text-banner);
        padding: 10px 0;
        font-size: 0.8rem;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
      }
      .banner-content {
        display: inline-block;
        animation: scroll-left 25s linear infinite;
      }
      @keyframes scroll-left {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      /* HERO Y ONDAS */
      .hero {
        width: 100%;
        background-color: #eabcce;
        position: relative;
      }
      .hero img {
        width: 100%;
        max-height: 65vh;
        object-fit: cover;
        display: block;
      }
      .wave-top {
        position: absolute;
        bottom: -2px;
        width: 100%;
        height: 10vw;
        z-index: 2;
        pointer-events: none;
      }

      .middle-section {
        background-color: var(--bg-main);
        padding: 40px 0 80px 0;
        position: relative;
        min-height: 250px;
      }
      .decoration-1 {
        position: absolute;
        right: 15%;
        top: 10%;
        width: 250px;
      }

      .wave-bottom {
        display: block;
        width: 100%;
        height: auto;
        background-color: var(--bg-main);
        margin-top: -2px;
      }
      .bottom-section {
        background-color: var(--bg-cream);
        position: relative;
        padding: 60px 0 150px 0;
        min-height: 300px;
        margin-top: -2px;
      }
      .decoration-2 {
        position: absolute;
        left: 15%;
        top: 20%;
        width: 250px;
      }

      /* FOOTER DE REDES */
      footer {
        background-color: var(--bg-header);
        padding: 30px;
        display: flex;
        justify-content: center;
        gap: 20px;
        align-items: center;
        border-top: 1px solid #ddd;
      }
      footer img {
        width: 50px;
        height: 50px;
        cursor: pointer;
        transition: transform 0.2s ease;
      }
      footer img:hover {
        transform: scale(1.1);
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        header {
          height: 100px;
        }
        .logo img {
          height: 80px;
        }
        .user-icons img {
          width: 40px;
          height: 40px;
        }
        .wave-top {
          height: 15vw;
        }
        footer img {
          width: 35px;
          height: 35px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="spacer"></div>
      <div class="logo"><img src="Logo.svg" alt="Siete 28 Logo" /></div>
      <div class="user-icons">
        <img src="iconos-07.svg" alt="Perfil" />
        <img src="iconos-04.svg" alt="Carrito" />
      </div>
    </header>

    <div class="banner">
      <div class="banner-content">
        10% DE DSCTO EN TU PRIMERA COMPRA ** 10% DE DSCTO EN TU PRIMERA COMPRA
        ** 10% DE DSCTO EN TU PRIMERA COMPRA ** 10% DE DSCTO EN TU PRIMERA
        COMPRA **
      </div>
    </div>

    <section class="hero">
      <img src="Elementos-14.svg" alt="Regalo" />
      <svg class="wave-top" viewBox="0 0 1440 150" preserveAspectRatio="none">
        <path
          fill="var(--bg-main)"
          d="M0,50 C400,150 1000,-10 1440,60 L1440,155 L0,155 Z"
        ></path>
      </svg>
    </section>

    <section class="middle-section">
      <img src="formas-15.svg" alt="Decoración" class="decoration-1" />
    </section>

    <svg class="wave-bottom" viewBox="0 0 1440 180" preserveAspectRatio="none">
      <defs>
        <path
          id="curveTextPath"
          d="M-50,90 C320,180 420,0 840,60 C1140,100 1280,30 1490,90"
        />
      </defs>

      <path
        fill="#f4f2e6"
        d="M-50,90 C320,180 420,0 840,60 C1140,100 1280,30 1490,90 L1490,180 L-50,180 Z"
      />

      <path
        fill="none"
        stroke="#0d5c46"
        stroke-width="28"
        d="M-50,90 C320,180 420,0 840,60 C1140,100 1280,30 1490,90"
      />

      <text fill="#ffffff" font-size="20" font-weight="bold" letter-spacing="5">
        <textPath href="#curveTextPath" dominant-baseline="middle">
          <animate
            attributeName="startOffset"
            from="100%"
            to="-100%"
            dur="25s"
            repeatCount="indefinite"
          />

          DETALLES QUE DEJAN
          HUELLA&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;DETALLES
          QUE DEJAN HUELLA
        </textPath>
      </text>
    </svg>

    <section class="bottom-section">
      <img src="formas-16.svg" alt="Decoración" class="decoration-2" />
    </section>

    <footer>
      <img src="iconos-01.svg" alt="Facebook" />
      <img src="iconos-02.svg" alt="Instagram" />
      <img src="iconos-03.svg" alt="TikTok" />
      <img src="iconos-08.svg" alt="WhatsApp" />
      <img src="iconos-09.svg" alt="Email" />
    </footer>
  </body>
</html>
