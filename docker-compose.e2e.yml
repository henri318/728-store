services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: testdb
    ports:
      - '5434:5432'
    volumes:
      - e2e_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testuser -d testdb']
      interval: 5s
      timeout: 3s
      retries: 10

  product-assets:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - '8081:80'
    volumes:
      - ./devresources/products:/usr/share/nginx/html/products:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://testuser:testpassword@db:5432/testdb
      NEXTAUTH_SECRET: e2e-test-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SEED_PRODUCT_ASSET_BASE_URL: http://localhost:8081
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      product-assets:
        condition: service_started
    command: >
      sh -c "
        npx prisma db push &&
        npx prisma db seed &&
        npm run start
      "

volumes:
  e2e_db_data:
